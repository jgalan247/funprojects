name: iot-platform

services:

  # ---------------------------------------------------------------------------
  # Mosquitto — MQTT broker. Auth enabled; reads credentials from
  # infra/mosquitto/passwd which is generated by scripts/bootstrap-mqtt-passwd.sh
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    platform: linux/arm64
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto:/mosquitto/config:ro
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
    networks:
      - iotnet

  # ---------------------------------------------------------------------------
  # Node-RED — automation flows, MQTT debugging, admin UI on :1880
  # ---------------------------------------------------------------------------
  node-red:
    image: nodered/node-red:latest
    platform: linux/arm64
    container_name: iot-node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=${TZ:-Europe/Jersey}
    volumes:
      - ./data/node-red:/data
    depends_on:
      - mosquitto
    networks:
      - iotnet

  # ---------------------------------------------------------------------------
  # API — FastAPI app serving the dashboard. v1 has a single /health route;
  # the rest grows in Phases 3-5.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    platform: linux/arm64
    container_name: iot-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    volumes:
      - ./data/sqlite:/data/sqlite
    depends_on:
      - mosquitto
    networks:
      - iotnet

  # ---------------------------------------------------------------------------
  # AI service — Claude Haiku wrapper. /ai/explain renders the template,
  # calls Anthropic (or the offline stub when no key is configured), and
  # writes ai_prompts + ai_responses rows to the shared SQLite database.
  # ---------------------------------------------------------------------------
  ai:
    build:
      context: .
      dockerfile: infra/ai/Dockerfile
    platform: linux/arm64
    container_name: iot-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data/sqlite:/data/sqlite
    networks:
      - iotnet

  # ---------------------------------------------------------------------------
  # Frontend — Vue 3 + Tailwind, built into static files and served by nginx.
  # nginx also reverse-proxies /api/* to the api service.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: infra/frontend/Dockerfile
    platform: linux/arm64
    container_name: iot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - iotnet

networks:
  iotnet:
    driver: bridge
