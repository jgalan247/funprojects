# Mosquitto v2 configuration for the Pi IoT Platform.
# v1: auth required, no TLS (school LAN only — see ADR in docs/architecture.md).

listener 1883 0.0.0.0
protocol mqtt

# Authentication — credentials live in the password file generated by
# scripts/bootstrap-mqtt-passwd.sh.
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
